run:
  name: core_v2_generalization_local_bfs_dfs_001
  overwrite: false

family: F1
dimension: bfs_vs_dfs

tasks:
  file: data/core_v2/tasks/bfs_dfs_tasks.json
  include:
    - branching_1
    - branching_2
    - branching_3

generation:
  models:
    - ollama:qwen2.5-coder:14b
    - ollama:qwen2.5-coder:32b
    - ollama:qwen3-coder:30b
    - ollama:devstral:latest
  repetitions: 5
  language: python
  pure_implementation: true
  models_config: configs/models.yaml

methods:
  - bfs
  - dfs

stripping:
  levels:
    - raw
    - no_comments
    - renamed
    - no_imports
    - format_normalized
