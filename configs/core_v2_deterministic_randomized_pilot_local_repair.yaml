run:
  name: core_v2_deterministic_randomized_pilot_local_repair_001
  overwrite: false

family: F1
dimension: deterministic_vs_randomized

tasks:
  file: data/core_v2/tasks/deterministic_randomized_tasks.json
  include:
    - letters_8
    - numbers_10
    - mixed_tokens

generation:
  models:
    - ollama:qwen2.5-coder:14b
    - ollama:qwen2.5-coder:32b
    - ollama:devstral:latest
  repetitions: 3
  language: python
  pure_implementation: true
  models_config: configs/models.yaml

methods:
  - deterministic
  - randomized

stripping:
  levels:
    - raw
    - no_comments
    - renamed
    - no_imports
    - format_normalized
